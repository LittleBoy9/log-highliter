<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="16" fill="url(#bg)"/>

  <!-- Console bracket -->
  <text x="16" y="48" font-family="monospace" font-size="28" font-weight="bold" fill="#64748b">&gt;</text>

  <!-- Log lines with colors -->
  <rect x="36" y="32" width="76" height="8" rx="2" fill="#3b82f6" opacity="0.9"/>
  <rect x="36" y="48" width="60" height="8" rx="2" fill="#eab308" opacity="0.9"/>
  <rect x="36" y="64" width="70" height="8" rx="2" fill="#ef4444" opacity="0.9"/>
  <rect x="36" y="80" width="50" height="8" rx="2" fill="#06b6d4" opacity="0.9"/>

  <!-- Highlight marker -->
  <rect x="8" y="32" width="4" height="56" rx="2" fill="#a855f7"/>

  <!-- Cursor blink -->
  <rect x="16" y="96" width="12" height="3" fill="#64748b">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>
</svg>
